<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Heat Map Dashboard</title>
    <link rel="icon" type="image/png" href="https://homelabplayground.com/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: {
                            bg: '#1e1e1e',
                            pane: '#252526',
                            border: '#3c3c3c',
                            accent: '#7c3aed',
                            text: '#cccccc'
                        }
                    },
                    fontFamily: {
                        mono: ['"Fira Code"', 'Consolas', 'Monaco', 'monospace'],
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #3c3c3c; border-radius: 4px; }
        
        .zone-container { min-height: 60px; transition: background-color 0.2s; }
        .sortable-ghost { opacity: 0.3; background: #7c3aed !important; }
        .drag-handle { cursor: grab; padding: 10px; }
        .drag-handle:active { cursor: grabbing; }
        
        /* Grid Table Styling */
        .grid-row { display: grid; grid-template-columns: 50px 120px 1fr 1fr 1.5fr; align-items: center; }
        @media (max-width: 768px) {
            .grid-row { grid-template-columns: 40px 80px 1fr 1fr; }
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-obsidian-bg text-obsidian-text">

    <header class="h-14 bg-obsidian-pane border-b border-obsidian-border flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-fire-flame-curved text-orange-500 text-xl"></i>
            <h1 class="font-bold tracking-tight text-white">Ticket Heat Map</h1>
        </div>
        <div class="flex items-center gap-4">
            <label class="cursor-pointer bg-obsidian-accent hover:bg-violet-600 text-white px-4 py-2 rounded text-xs transition-colors flex items-center gap-2">
                <i class="fa-solid fa-file-csv"></i> Import CSV
                <input type="file" id="csv-upload" accept=".csv" class="hidden">
            </label>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-6">
        <div class="max-w-6xl mx-auto space-y-4">
            
            <div>
                <h2 id="header-date" class="text-2xl font-bold text-white mb-1"></h2>
                <p class="text-sm text-gray-500 italic">Drag tickets directly into the colored zones below.</p>
            </div>

            <div class="grid-row bg-obsidian-pane border border-obsidian-border rounded-t-lg p-2 text-xs uppercase font-bold text-gray-500">
                <div class="text-center"></div>
                <div class="px-2">Ticket #</div>
                <div class="px-2">Summary</div>
                <div class="px-2">Company</div>
                <div class="px-2 hide-mobile">Notes</div>
            </div>

            <div class="border border-obsidian-border rounded-lg overflow-hidden bg-obsidian-pane">
                <div class="bg-red-600 text-white font-bold text-center py-1.5 text-sm tracking-widest uppercase">Hot</div>
                <div id="zone-hot" class="zone-container p-1"></div>
            </div>

            <div class="border border-obsidian-border rounded-lg overflow-hidden bg-obsidian-pane">
                <div class="bg-yellow-500 text-black font-bold text-center py-1.5 text-sm tracking-widest uppercase">Warm</div>
                <div id="zone-warm" class="zone-container p-1"></div>
            </div>

            <div class="border border-obsidian-border rounded-lg overflow-hidden bg-obsidian-pane">
                <div class="bg-blue-600 text-white font-bold text-center py-1.5 text-sm tracking-widest uppercase">Cold</div>
                <div id="zone-cold" class="zone-container p-1"></div>
            </div>

        </div>
    </main>

    <footer class="bg-obsidian-pane border-t border-obsidian-border py-3 text-center shrink-0 z-10 flex flex-col md:flex-row justify-center items-center gap-3">
        <a href="https://homelabplayground.com" class="text-gray-500 hover:text-violet-400 text-xs transition-colors font-sans no-underline">
            HomeLab Playground
        </a>
        <span class="hidden md:block text-obsidian-border mx-1">|</span>
        <a href="https://www.buymeacoffee.com/bryjogar" target="_blank" class="inline-flex items-center px-3 py-1 bg-obsidian-accent hover:bg-violet-600 text-white text-xs font-sans rounded-full transition-colors no-underline">
            <i class="fa-solid fa-mug-hot mr-1.5"></i>
            <span>Support The Tools</span>
        </a>
    </footer>

    <script>
        // Set Header Date
        const now = new Date();
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        document.getElementById('header-date').textContent = `Ticket heat map for ${days[now.getDay()]}, ${now.toISOString().split('T')[0]}`;

        const csvInput = document.getElementById('csv-upload');

        // CSV Processing
        csvInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    renderTickets(results.data);
                }
            });
        });

        function renderTickets(data) {
            const coldZone = document.getElementById('zone-cold');
            coldZone.innerHTML = ''; // Clear previous

            data.forEach(row => {
                const id = row['Ticket Number'] || row['ID'] || 'N/A';
                const summary = row['Summary Description'] || row['Summary'] || '';
                const company = row['Company'] || row['Company_Name'] || '';
                
                const truncatedSummary = summary.length > 30 ? summary.substring(0, 27) + '...' : summary;

                const div = document.createElement('div');
                div.className = "grid-row border-b border-obsidian-border/50 hover:bg-white/5 transition-colors group py-2";
                div.innerHTML = `
                    <div class="text-center text-gray-600 group-hover:text-obsidian-accent drag-handle">
                        <i class="fa-solid fa-grip-vertical"></i>
                    </div>
                    <div class="px-2 font-mono text-sm">${id}</div>
                    <div class="px-2 text-sm truncate" title="${summary}">${truncatedSummary}</div>
                    <div class="px-2 text-sm truncate">${company}</div>
                    <div class="px-2 hide-mobile">
                        <input type="text" placeholder="Notes..." class="bg-transparent w-full text-xs text-gray-500 focus:text-obsidian-accent outline-none">
                    </div>
                `;
                coldZone.appendChild(div);
            });
        }

        // Initialize Shared Drag & Drop Groups
        const zoneIds = ['zone-hot', 'zone-warm', 'zone-cold'];
        zoneIds.forEach(id => {
            new Sortable(document.getElementById(id), {
                group: 'tickets', // This allows dragging between the different containers
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                emptyInsertThreshold: 50 // Makes it easier to drop into empty zones
            });
        });
    </script>
</body>
</html>
</html>
